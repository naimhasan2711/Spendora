name: spendora
description: A complete, production-ready, fully offline Expense Tracker app.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.5.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1

  # Local Database
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Charts
  fl_chart: ^0.68.0

  # UI Components
  cupertino_icons: ^1.0.6
  flutter_animate: ^4.5.0
  smooth_page_indicator: ^1.1.0
  percent_indicator: ^4.2.3
  flutter_slidable: ^3.1.1
  intl: ^0.19.0
  uuid: ^4.4.2
  path_provider: ^2.1.3
  share_plus: ^9.0.0
  image_picker: ^1.1.2

  # Security
  local_auth: ^2.2.0

  # Export
  pdf: ^3.11.0
  csv: ^6.0.0

  # Icons & Colors
  flex_color_picker: ^3.5.1

  # Calendar
  table_calendar: ^3.1.2

  # Navigation
  go_router: ^14.2.0

  # Utilities
  collection: ^1.18.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
